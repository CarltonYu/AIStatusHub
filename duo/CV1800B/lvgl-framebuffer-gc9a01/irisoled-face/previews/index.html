      max-width: 1320px;

      font-weight: 650;

      color: #aeb9c2;
    }
    .grid {

      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }
    figure {
      margin: 0;
      padding: 12px;
      background: #181c20;
      border: 1px solid #2a3138;
      border-radius: 8px;
    }
    img {
      width: 100%;
      image-rendering: pixelated;
      background: #000;
      display: block;
    }
    figcaption {
      margin-top: 8px;
      color: #b8c2ca;
      font-size: 13px;
      line-height: 1.35;
    }
    code {
      color: #8be9fd;
    }
